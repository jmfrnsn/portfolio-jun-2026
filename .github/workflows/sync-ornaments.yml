name: Sync ornament sources

on:
  repository_dispatch:
    types: [ornament-sync]
  workflow_dispatch:
  schedule:
    # Backup poll if a webhook delivery is missed.
    - cron: "*/20 * * * *"

concurrency:
  group: sync-ornaments
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Notion and export snapshot
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_ORNAMENTS_DATA_SOURCE_ID: ${{ secrets.NOTION_ORNAMENTS_DATA_SOURCE_ID }}
        run: npm run sync-ornaments-and-push -- --no-push

      - name: Commit and push export if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Sync ornament sources from Notion
          file_pattern: data/ornaments/sources.json
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
